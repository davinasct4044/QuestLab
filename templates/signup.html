<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in | QuestLab</title>
</head>
<body>
    <form action="{{ url_for('sign_up', routename=routename)}}" method="post">
        <!--no action vc passa o comando usando o jinja para executar a função desejada em python, tem
         que colocar o method tbm.-->
        <div class="Form">
            <div class="nome">
                <input name="username" placeholder="nome">
                <!--tem q colocar name="" pq é assim que o flask identifica a tag -->
            </div>
            <div class="email">
                <input name="email" placeholder="email">
            </div>
            <div class="senha">
                <input name="password" placeholder="senha">
            </div>
            <button class="enviar">
                enviar
            </button>
        </div>
    </form>
</body>
</html>
