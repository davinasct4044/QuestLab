<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestLab</title>


</head>
<body>
    {% if session.get('username') %}
        <h5>{{ session.get('username') }}</h5>
        <div>
            <form action="{{ url_for('sign_out', routename='index') }}" method="post">
                <button>Sair</button>
            </form>
        </div>
        <div>
            <form action="{{ url_for('delete_account', routename='index', id=session.get('id')) }}" method="post">
                <button>Excluir conta e sair</button>
            </form>
        </div>
        <div>
            <a href="{{ url_for('edit_account',routename='index') }}">Trocar a senha</a>
        </div>
    {% else %}
        <a href="{{ url_for('sign_up', routename='index') }}">Inscreva-se</a>
        <a href="{{ url_for('login', routename='index') }}">Entrar</a>
    {% endif %}
    <form action="{{url_for('generate_exam')}}" method="post" >
        <textarea name="inputcontent"></textarea>
        <button>Enviar</button>
    </form>

</body>
</html>
